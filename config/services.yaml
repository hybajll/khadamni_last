# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.motivational_video_embed_url: '%env(string:MOTIVATIONAL_VIDEO_EMBED_URL)%'
    app.motivational_video_path: '%env(string:MOTIVATIONAL_VIDEO_PATH)%'
    app.openai_api_key: '%env(string:OPENAI_API_KEY)%'
    app.openai_model: '%env(string:OPENAI_MODEL)%'
    app.ai_provider: '%env(string:AI_PROVIDER)%'
    app.openrouter_api_key: '%env(string:OPENROUTER_API_KEY)%'
    app.openrouter_model: '%env(string:OPENROUTER_MODEL)%'
    app.gemini_api_key: '%env(string:GEMINI_API_KEY)%'
    app.gemini_model: '%env(string:GEMINI_MODEL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # --- AI Providers (CV improvement) ---
    # We define these here (not in config/packages) to ensure Symfony always loads them.
    App\Service\OpenAiResponsesClient:
        arguments:
            $apiKey: '%app.openai_api_key%'
            $model: '%app.openai_model%'

    App\Service\OpenRouterChatClient:
        arguments:
            $apiKey: '%app.openrouter_api_key%'
            $model: '%app.openrouter_model%'

    App\Service\GeminiGenerateContentClient:
        arguments:
            $apiKey: '%app.gemini_api_key%'
            $model: '%app.gemini_model%'

    App\Service\LlmClientFactory:
        arguments:
            $provider: '%app.ai_provider%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
