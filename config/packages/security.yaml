security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto
            cost: 12
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        society_provider:
            entity:
                class: App\Entity\Society
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        society:
            pattern: ^/society
            lazy: true
            provider: society_provider
            user_checker: App\Security\UserChecker

            form_login:
                login_path: society_login
                check_path: society_login
                enable_csrf: true
                csrf_token_id: authenticate
                username_parameter: _username
                password_parameter: _password
                success_handler: App\Security\SocietyLoginSuccessHandler

            logout:
                path: society_logout
                target: /
                invalidate_session: true
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                csrf_token_id: authenticate
                username_parameter: _username
                password_parameter: _password
                success_handler: App\Security\LoginSuccessHandler

            logout:
                path: app_logout
                target: /
                invalidate_session: true

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/ajoutuser, roles: PUBLIC_ACCESS }
        - { path: ^/society/login, roles: PUBLIC_ACCESS }
        - { path: ^/society/register, roles: PUBLIC_ACCESS }
        - { path: ^/society/subscription, roles: ROLE_SOCIETY }
        - { path: ^/society/payment, roles: ROLE_SOCIETY }
        - { path: ^/society/(dashboard|home|profile|offers), roles: ROLE_SOCIETY }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_USER }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/cv, roles: ROLE_USER }
        - { path: ^/subscription, roles: ROLE_USER }
        - { path: ^/payment, roles: ROLE_USER }

    role_hierarchy:
        ROLE_SUPERADMIN: [ROLE_MODERATOR, ROLE_MANAGER, ROLE_ADMIN]
        ROLE_MODERATOR: [ROLE_ADMIN]
        ROLE_MANAGER: [ROLE_ADMIN]

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
