security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_SUPERADMIN: [ROLE_MODERATOR, ROLE_MANAGER, ROLE_ADMIN]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        society_provider:
            entity:
                class: App\Entity\Society
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        society:
            pattern: ^/society
            lazy: true
            provider: society_provider

            form_login:
                login_path: society_login
                check_path: society_login
                enable_csrf: true
                success_handler: App\Security\SocietyLoginSuccessHandler

            user_checker: App\Security\UserChecker

            logout:
                path: society_logout
                target: app_home

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\LoginSuccessHandler

            user_checker: App\Security\UserChecker

            logout:
                path: app_logout
                target: app_home

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true

    access_control:
        - { path: ^/society/login, roles: PUBLIC_ACCESS }
        - { path: ^/society/register, roles: PUBLIC_ACCESS }
        - { path: ^/society, roles: ROLE_SOCIETY }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_USER }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/cv, roles: ROLE_USER }
        - { path: ^/reclamations, roles: [ROLE_USER, ROLE_SOCIETY] }
        - { path: ^/reclamation, roles: [ROLE_USER, ROLE_SOCIETY] }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
